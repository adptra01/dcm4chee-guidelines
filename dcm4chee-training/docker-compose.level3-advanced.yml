# ============================================================
# DCM4CHEE Archive 5.x - Level 3: Advanced (Production-Ready)
# ============================================================
# Untuk RS rujukan: 10+ modality, 200+ beds, 300-500 study/hari
# Full features: Security (Keycloak), Monitoring (ELK), HA-ready
#
# Services:
#   LDAP + PostgreSQL + Keycloak + OAuth2 Proxy + Archive
#   + Elasticsearch + Logstash + Kibana + Grafana + HAProxy
#
# Usage:
#   docker compose -f docker-compose.level3-advanced.yml up -d
#   docker compose -f docker-compose.level3-advanced.yml logs -f
#
# Secured URLs (after startup):
#   Archive UI:     https://localhost:8443/dcm4chee-arc/ui2
#   Keycloak:       https://localhost:8843/admin
#   Kibana:         https://localhost:5601 (via OAuth2 proxy)
#   Grafana:        https://localhost:8300 (direct)
# ============================================================

services:

  # ╔═══════════════════════════════════════════════════════════╗
  # ║  INFRASTRUCTURE LAYER                                    ║
  # ╚═══════════════════════════════════════════════════════════╝

  # ─────────────────────────────────────────────────────────
  # OpenLDAP - Configuration Backend (Secured)
  # ─────────────────────────────────────────────────────────
  ldap:
    image: dcm4che/slapd-dcm4chee:2.6.10-34.2
    container_name: dcm4chee-ldap
    hostname: ldap
    environment:
      LDAP_ROOTPASS: ${LDAP_PASSWORD:-secret}
      LDAP_CONFIGPASS: ${LDAP_PASSWORD:-secret}
      SLAPD_DOMAIN: ${LDAP_DOMAIN:-dcm4che.org}
      SLAPD_ORGANIZATION: ${LDAP_ORG:-dcm4che}
      STORAGE_DIR: /storage/fs1
    expose:
      - "389"
    volumes:
      - ldap_data:/var/lib/openldap/openldap-data
      - ldap_config:/etc/openldap/slapd.d
    healthcheck:
      test: ["CMD", "ldapwhoami", "-x", "-H", "ldap://localhost",
             "-D", "cn=admin,dc=dcm4che,dc=org", "-w", "${LDAP_PASSWORD:-secret}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cpus: "0.5"
    mem_limit: "512m"

  # ─────────────────────────────────────────────────────────
  # PostgreSQL 17 - Production Database
  # ─────────────────────────────────────────────────────────
  db:
    image: dcm4che/postgres-dcm4chee:17.4-34
    container_name: dcm4chee-db
    hostname: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pacsdb}
      POSTGRES_USER: ${POSTGRES_USER:-pacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning
      POSTGRES_SHARED_BUFFERS: "2GB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "6GB"
      POSTGRES_WORK_MEM: "64MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "512MB"
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backup/db:/backup
      - ./db-config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pacs} -d ${POSTGRES_DB:-pacsdb}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true
    cpus: "2.0"
    mem_limit: "4g"

  # ─────────────────────────────────────────────────────────
  # Keycloak 26 - Authentication Server (SSO)
  # ─────────────────────────────────────────────────────────
  keycloak:
    image: dcm4che/keycloak:26.0.6
    container_name: dcm4chee-keycloak
    hostname: keycloak
    environment:
      KEYCLOAK_ADMIN: root
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      KC_DB_URL: postgresql://${POSTGRES_USER:-pacs}:${POSTGRES_PASSWORD}@db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-pacs}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_VENDOR: POSTGRES
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_LOG_LEVEL: WARN
    expose:
      - "8080"
      - "8443"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\n\r\n' >&3; if [ $? -eq 0 ]; then timeout 1 cat <&3 | grep -q '200 OK'; else exit 1; fi"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped
    networks:
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cpus: "1.0"
    mem_limit: "2g"

  # ╔═══════════════════════════════════════════════════════════╗
  # ║  SECURITY LAYER                                           ║
  # ╚═══════════════════════════════════════════════════════════╝

  # ─────────────────────────────────────────────────────────
  # OAuth2 Proxy - SSO Gate untuk Web UI & Kibana
  # Authenticate via Keycloak, proxy ke internal services
  # ─────────────────────────────────────────────────────────
  oauth2-proxy:
    image: dcm4che/oauth2-proxy:7.7.1
    container_name: dcm4chee-oauth2-proxy
    hostname: oauth2-proxy
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://keycloak:8843/realms/dcm4che
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_CLIENT_ID:-dcm4chee-arc-ui}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://localhost:8843/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://arc:8080
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_EMAIL_DOMAIN: "*"
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET}
      OAUTH2_PROXY_SSL_CERT_FILE: /etc/certs/cert.pem
      OAUTH2_PROXY_SSL_KEY_FILE: /etc/certs/key.pem
      OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY: "false"
      OAUTH2_PROXY_ALLOWED_ROLES: "auth,user,root,admin"
    ports:
      - "8843:4180"       # HTTPS proxy
    volumes:
      - ./certs:/etc/certs:ro
    depends_on:
      keycloak:
        condition: service_healthy
      arc:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cpus: "0.25"
    mem_limit: "256m"

  # ╔═══════════════════════════════════════════════════════════╗
  # ║  APPLICATION LAYER                                      ║
  # ╚═══════════════════════════════════════════════════════════╝

  # ─────────────────────────────────────────────────────────
  # DCM4CHEE Archive - SECURED (WildFly + Archive App)
  # Production configuration dengan Keycloak auth
  # ─────────────────────────────────────────────────────────
  arc:
    image: dcm4che/dcm4chee-arc-psql:5.34.2-secure
    container_name: dcm4chee-arc
    hostname: arc
    environment:
      # Database
      POSTGRES_DB: ${POSTGRES_DB:-pacsdb}
      POSTGRES_USER: ${POSTGRES_USER:-pacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Archive config
      ARCHIVE_STORAGE_DIR: /storage/archive
      ARCHIVE_PORT: 8080
      ARCHIVE_SSL_PORT: 8443
      ARCHIVE_DICOM_PORT: 11112

      # LDAP
      LDAP_URL: ldap://ldap:389
      LDAP_BASE_DN: dc=dcm4che,dc=org
      LDAP_USER: cn=admin,dc=dcm4che,dc=org
      LDAP_PASSWORD: ${LDAP_PASSWORD:-secret}
      LDAP_ROOTPASS: ${LDAP_PASSWORD:-secret}

      # Keycloak auth
      AUTH_SERVER_URL: https://keycloak:8843
      UI_AUTH_SERVER_URL: https://oauth2-proxy:4180

      # Security
      KEYCLOAK_URL: https://keycloak:8843
      KEYCLOAK_REALM: dcm4che
      KEYCLOAK_CLIENT_ID: ${OAUTH2_CLIENT_ID:-dcm4chee-arc-ui}

      # Performance - Production sizing
      WILDFLY_WAIT_FOR: ldap:389 db:5432
      WILDFLY_CHOWN: /storage
      WILDFLY_JAVA_OPTS: "-Xms4g -Xmx8g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+ParallelRefProcEnabled -Djava.security.egd=file:/dev/./urandom"

      # Monitoring - Log to Logstash
      LOGSTASH_HOST: logstash
      LOGGING_MODE: production

    # Internal ports (tidak di-expose langsung ke luar)
    expose:
      - "8080"       # Web UI & REST API
      - "8443"       # HTTPS
      - "9990"       # WildFly Admin
      - "11112"     # DICOM
      - "2762"       # HL7 ORM
      - "2575"       # HL7 ADT

    # Port mapping untuk akses langsung (backup/backup)
    ports:
      - "8081:8080"
      - "8443:8443"
      - "9990:9990"
      - "11112:11112"
      - "2762:2762"
      - "2575:2575"

    volumes:
      - storage_data:/storage/archive
      - wildfly_data:/opt/wildfly/standalone
      - ./certs:/etc/x509:ro
      - ./backup/archive:/backup
      - ./scripts:/scripts:ro

    depends_on:
      ldap:
        condition: service_healthy
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-kf", "-H", "Authorization: Bearer dummy", "http://localhost:8080/dcm4chee-arc/ui2/"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 300s
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    logging:
      driver: "gelf"
      options:
        gelf-address: "udp://logstash:8514"
        labels: "app=dcm4chee,env=production"
    security_opt:
      - no-new-privileges:true
    cpus: "4.0"
    mem_limit: "12g"
    mem_reservation: "8g"

  # ╔═══════════════════════════════════════════════════════════╗
  # ║  MONITORING & OBSERVABILITY LAYER                       ║
  # ╚═══════════════════════════════════════════════════════════╝

  # ─────────────────────────────────────────────────────────
  # Elasticsearch 8 - Search & Analytics Engine
  # Menyimpan logs dan metrics dari semua services
  # ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    container_name: dcm4chee-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g -XX:+UseG1GC"
      - cluster.name=dcm4chee-monitor
      - bootstrap.memory_lock=true
      - action.auto_create_index=false
    expose:
      - "9200"
      - "9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\\\"status\\\":\\\"green\\\"\\|\\\"status\\\":\\\"yellow\\\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - monitoring-net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    security_opt:
      - no-new-privileges:true
    cpus: "2.0"
    mem_limit: "4g"
    mem_reservation: "3g"

  # ─────────────────────────────────────────────────────────
  # Logstash 8 - Log Processing Pipeline
  # Menerima logs GELF dari DCM4CHEE dan kirim ke Elasticsearch
  # ─────────────────────────────────────────────────────────
  logstash:
    image: dcm4che/logstash-dcm4chee:8.15.1-18
    container_name: dcm4chee-logstash
    hostname: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - LOGSTASH_HOST=logstash
      - MONITORING_ENABLED=true
    expose:
      - "8514/udp"     # GELF input (dari DCM4CHEE)
      - "12201/udp"    # GELF from other services
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/filter-hashtree:/usr/share/logstash/data/filter-hashtree
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cpus: "1.0"
    mem_limit: "1g"

  # ─────────────────────────────────────────────────────────
  # Kibana 8 - Visualization Dashboard
  # Akses via OAuth2 Proxy (https://localhost:8843/kibana)
  # ─────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.1
    container_name: dcm4chee-kibana
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=dcm4chee-kibana
      - SERVER_BASE_PATH=/kibana
      - LOGGING_DEST=stdout
    expose:
      - "5601"
    volumes:
      - ./kibana/config:/usr/share/kibana/config:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring-net
      - frontend-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cpus: "1.0"
    mem_limit: "2g"

  # ─────────────────────────────────────────────────────────
  # Grafana 11 - Metrics Dashboard
  # ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: dcm4chee-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeit}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:8300
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "8300:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - monitoring-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cpus: "0.5"
    mem_limit: "512m"

  # ╔═══════════════════════════════════════════════════════════╗
  # ║  BACKUP & MAINTENANCE LAYER                             ║
  # ╚═══════════════════════════════════════════════════════════╝

  # ─────────────────────────────────────────────────────────
  # Backup Manager - Automated Backup Service
  # ─────────────────────────────────────────────────────────
  backup-manager:
    image: ubuntu:22.04
    container_name: dcm4chee-backup-manager
    hostname: backup-manager
    environment:
      BACKUP_DEST: /backup
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-pacsdb}
      DB_USER: ${POSTGRES_USER:-pacs}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STORAGE_DIR: /storage/archive
      LDAP_HOST: ldap
      LDAP_PASSWORD: ${LDAP_PASSWORD:-secret}
    volumes:
      - ./backup:/backup
      - ./backup/scripts:/scripts
      - storage_data:/storage/archive:ro
      - wildfly_data:/opt/wildfly/standalone:ro
      - keycloak_data:/opt/keycloak/data:ro
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_healthy
    restart: "no"
    networks:
      - backend-net
    cpus: "0.5"
    mem_limit: "512m"

# ╔═══════════════════════════════════════════════════════════╗
# ║  NETWORKS                                               ║
# ╚═══════════════════════════════════════════════════════════╝
networks:
  # Frontend network - services yang butuh akses dari luar
  frontend-net:
    name: dcm4chee_level3_frontend
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

  # Backend network - services internal only
  backend-net:
    name: dcm4chee_level3_backend
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

  # Monitoring network - ELK stack
  monitoring-net:
    name: dcm4chee_level3_monitoring
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.0.0/24

# ╔═══════════════════════════════════════════════════════════╗
# ║  VOLUMES                                                ║
# ╚═══════════════════════════════════════════════════════════╝
volumes:
  # LDAP
  ldap_data:
    name: dcm4chee_level3_ldap_data
  ldap_config:
    name: dcm4chee_level3_ldap_config

  # Database
  db_data:
    name: dcm4chee_level3_db_data

  # Keycloak
  keycloak_data:
    name: dcm4chee_level3_keycloak

  # Archive
  storage_data:
    name: dcm4chee_level3_storage
  wildfly_data:
    name: dcm4chee_level3_wildfly

  # Monitoring
  es_data:
    name: dcm4chee_level3_elasticsearch

  # Grafana
  grafana_data:
    name: dcm4chee_level3_grafana