input {
  # GELF from DCM4CHEE Archive
  gelf {
    port => 8514
    codec => json
    type => "dcm4chee-archive"
  }

  # Syslog from other services
  syslog {
    port => 12201
    codec => json
    type => "system"
  }
}

filter {
  if [type] == "dcm4chee-archive" {
    # Parse JSON jika perlu
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "parsed"
      }
    }

    # Extract log level
    if [message] =~ /ERROR/ or [message] =~ /SEVERE/ {
      mutate { add_tag => ["error"] }
    } else if [message] =~ /WARN/ {
      mutate { add_tag => ["warning"] }
    } else if [message] =~ /INFO/ {
      mutate { add_tag => ["info"] }
    }

    # Add metadata
    mutate {
      add_field => {
        "environment" => "production"
        "service" => "dcm4chee-archive"
      }
    }
  }

  if [type] == "system" {
    mutate {
      add_field => {
        "environment" => "production"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "dcm4chee-archive-%{+YYYY.MM.dd}"
    codec => json
  }
}