# PostgreSQL configuration for DCM4CHEE Level 3 (Production)
# Copy to: ./db-config/postgresql.conf

# ============================================================
# CONNECTION SETTINGS
# ============================================================
listen_addresses = '*'
max_connections = 200

# ============================================================
# MEMORY SETTINGS (8GB available)
# ============================================================
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 64MB
maintenance_work_mem = 512MB

# ============================================================
# WAL SETTINGS
# ============================================================
wal_level = replica
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB

# ============================================================
# CHECKPOINT SETTINGS
# ============================================================
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# ============================================================
# QUERY OPTIMIZATION (CRITICAL for DCM4CHEE)
# ============================================================
from_collapse_limit = 16
join_collapse_limit = 16
# Reference: https://github.com/dcm4che/dcm4chee-arc-light/issues/4621

# ============================================================
# PARALLEL QUERIES
# ============================================================
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers_per_gather = 4

# ============================================================
# BACKGROUND WRITER
# ============================================================
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 1000
bgwriter_lru_multiplier = 5.0

# ============================================================
# LOGGING (minimal for performance)
# ============================================================
log_statement = 'none'
log_min_duration_statement = 5000
log_connections = off
log_disconnections = off

# ============================================================
# REPLICATION
# ============================================================
wal_level = replica
max_wal_senders = 3
wal_keep_size = 256MB
hot_standby = on