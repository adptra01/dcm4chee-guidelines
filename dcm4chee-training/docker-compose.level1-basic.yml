# ============================================================
# DCM4CHEE Archive 5.x - Level 1: Basic (Minimum Setup)
# ============================================================
# Untuk RS kecil: 1-2 modality, < 50 study/hari
# Cocok untuk: Pembelajaran, testing, RS type D/C
#
# Services: LDAP + PostgreSQL + Archive (3 container minimum)
#
# Usage:
#   docker compose -f docker-compose.level1-basic.yml up -d
#   docker compose -f docker-compose.level1-basic.yml logs -f
#   docker compose -f docker-compose.level1-basic.yml down
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # OpenLDAP - Configuration Storage
  # Menyimpan semua konfigurasi DCM4CHEE (AE titles, device config, dll)
  # sesuai standar DICOM Part 15 Annex H
  # ─────────────────────────────────────────────────────────
  ldap:
    image: dcm4che/slapd-dcm4chee:2.6.10-34.2
    container_name: dcm4chee-ldap
    hostname: ldap
    environment:
      LDAP_ROOTPASS: ${LDAP_PASSWORD:-secret}
      LDAP_CONFIGPASS: ${LDAP_PASSWORD:-secret}
      SLAPD_DOMAIN: ${LDAP_DOMAIN:-dcm4che.org}
      SLAPD_ORGANIZATION: ${LDAP_ORG:-dcm4che}
      STORAGE_DIR: /storage/fs1
    ports:
      - "389:389"
    volumes:
      - ldap_data:/var/lib/openldap/openldap-data
      - ldap_config:/etc/openldap/slapd.d
    healthcheck:
      test: ["CMD", "ldapwhoami", "-x", "-H", "ldap://localhost",
             "-D", "cn=admin,dc=dcm4che,dc=org", "-w", "${LDAP_PASSWORD:-secret}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - dcm4chee-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────
  # PostgreSQL - Metadata Database
  # Menyimpan metadata DICOM (patients, studies, series, instances)
  # BUKAN file gambar - gambar disimpan di filesystem storage
  # ─────────────────────────────────────────────────────────
  db:
    image: dcm4che/postgres-dcm4chee:17.4-34
    container_name: dcm4chee-db
    hostname: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pacsdb}
      POSTGRES_USER: ${POSTGRES_USER:-pacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pacs}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backup/db:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pacs} -d ${POSTGRES_DB:-pacsdb}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - dcm4chee-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────
  # DCM4CHEE Archive - WildFly Application Server
  # Core PACS functionality: Storage SCP, Query/Retrieve, MWL, REST API
  # ─────────────────────────────────────────────────────────
  arc:
    image: dcm4che/dcm4chee-arc-psql:5.34.2
    container_name: dcm4chee-arc
    hostname: arc
    environment:
      # Database connection
      POSTGRES_DB: ${POSTGRES_DB:-pacsdb}
      POSTGRES_USER: ${POSTGRES_USER:-pacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pacs}

      # Archive configuration
      ARCHIVE_STORAGE_DIR: /storage/archive
      ARCHIVE_PORT: 8080
      ARCHIVE_SSL_PORT: 8443
      ARCHIVE_DICOM_PORT: 11112

      # LDAP connection
      LDAP_URL: ldap://ldap:389
      LDAP_BASE_DN: dc=dcm4che,dc=org
      LDAP_USER: cn=admin,dc=dcm4che,dc=org
      LDAP_PASSWORD: ${LDAP_PASSWORD:-secret}
      LDAP_ROOTPASS: ${LDAP_PASSWORD:-secret}

      # Startup order - tunggu LDAP dan DB healthy dulu
      WILDFLY_WAIT_FOR: ldap:389 db:5432
      WILDFLY_CHOWN: /storage
      WILDFLY_JAVA_OPTS: "-Xms1g -Xmx2g -XX:+UseG1GC"

    ports:
      - "8080:8080"       # HTTP - Web UI & REST API
      - "8443:8443"       # HTTPS - Secured access
      - "9990:9990"       # WildFly Admin Console (HTTP)
      - "9993:9993"       # WildFly Admin Console (HTTPS)
      - "11112:11112"     # DICOM - Storage SCP / Query-Retrieve SCP
      - "2762:2762"       # HL7 MLLP - ORM Orders (MWL)
      - "2575:2575"       # HL7 MLLP - ADT Patient Events

    volumes:
      - storage_data:/storage/archive
      - wildfly_data:/opt/wildfly/standalone
      - ./backup/archive:/backup

    depends_on:
      ldap:
        condition: service_healthy
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-kf", "http://localhost:8080/dcm4chee-arc/ui2/"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 300s
    restart: unless-stopped
    networks:
      - dcm4chee-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

# ─────────────────────────────────────────────────────────
# Named Volumes
# Data persists across container restarts
# ─────────────────────────────────────────────────────────
volumes:
  ldap_data:
    name: dcm4chee_level1_ldap_data
  ldap_config:
    name: dcm4chee_level1_ldap_config
  db_data:
    name: dcm4chee_level1_db_data
  storage_data:
    name: dcm4chee_level1_storage
  wildfly_data:
    name: dcm4chee_level1_wildfly

# ─────────────────────────────────────────────────────────
# Network
# Bridge network untuk komunikasi antar container
# ─────────────────────────────────────────────────────────
networks:
  dcm4chee-net:
    name: dcm4chee_level1_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16